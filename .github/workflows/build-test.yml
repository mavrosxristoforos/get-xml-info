name: Build Test

on:
  pull_request:
    paths-ignore:
      - "**.md"
  push:
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["24"]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies with NPM
        run: |
          npm i -g @vercel/ncc
          npm install

      - name: Build new release
        run: ncc build index.js --license licenses.txt

self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run the action against test.xml
        id: getxml
        uses: ./
        with:
          xml-file: 'test.xml'
          xpath: '//version'
      - name: Assert output
        run: |
          if [ "${{ steps.getxml.outputs.info }}" != "1.0.20" ]; then
            echo "Expected 1.0.20, got: ${{ steps.getxml.outputs.info }}"
            exit 1
          fi